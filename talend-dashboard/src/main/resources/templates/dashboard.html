<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/header :: head}"></th:block>
</head>
<body>

<th:block th:replace="~{fragments/header :: navbar}"></th:block>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar filtres (sticky) -->
        <div class="col-md-3 col-lg-2 filter-sidebar">
            <h5 class="sidebar-title"><i class="bi bi-funnel"></i> Filtres</h5>
            <div class="mb-3">
                <label for="machineSelect" class="form-label">Machine</label>
                <select id="machineSelect" class="form-select">
                    <option value="">Toutes</option>
                    <option th:each="m : ${machines}" th:value="${m.name}" th:text="${m.name}"></option>
                </select>
            </div>
            <div class="mb-3">
                <label for="jobSelect" class="form-label">Job</label>
                <select id="jobSelect" class="form-select">
                    <option value="">Tous les jobs</option>
                </select>
                <button id="reloadJobsBtn" class="btn btn-sm btn-outline-secondary mt-1" title="Recharger la liste">⟳</button>
            </div>
            <div class="mb-3">
                <label for="startDate" class="form-label">Début</label>
                <input type="datetime-local" id="startDate" class="form-control">
            </div>
            <div class="mb-3">
                <label for="endDate" class="form-label">Fin</label>
                <input type="datetime-local" id="endDate" class="form-control">
            </div>
            <button id="refreshBtn" class="btn btn-primary w-100 mb-2"><i class="bi bi-arrow-repeat"></i> Rafraîchir</button>
            <button id="resetBtn" class="btn btn-outline-secondary w-100"><i class="bi bi-x-circle"></i> Réinitialiser</button>
        </div>

        <!-- Contenu principal -->
        <div class="col-md-9 col-lg-10 main-content">
            <!-- KPIs -->
            <div class="row g-3 mb-4">
                <div class="col-xl-2 col-md-4 col-sm-6">
                    <div class="card kpi-card kpi-executions">
                        <div class="card-body">
                            <h5 class="card-title">Exécutions</h5>
                            <p class="card-text" id="kpiTotal">-</p>
                        </div>
                    </div>
                </div>
                <div class="col-xl-2 col-md-4 col-sm-6">
                    <div class="card kpi-card kpi-success">
                        <div class="card-body">
                            <h5 class="card-title">Succès %</h5>
                            <p class="card-text" id="kpiSuccess">-</p>
                        </div>
                    </div>
                </div>
                <div class="col-xl-2 col-md-4 col-sm-6">
                    <div class="card kpi-card kpi-duration">
                        <div class="card-body">
                            <h5 class="card-title">Durée moy.</h5>
                            <p class="card-text" id="kpiDuration">-</p>
                        </div>
                    </div>
                </div>
                <div class="col-xl-2 col-md-4 col-sm-6">
                    <div class="card kpi-card kpi-errors">
                        <div class="card-body">
                            <h5 class="card-title">Erreurs</h5>
                            <p class="card-text" id="kpiErrors">-</p>
                        </div>
                    </div>
                </div>
                <div class="col-xl-2 col-md-4 col-sm-6">
                    <div class="card kpi-card kpi-rows">
                        <div class="card-body">
                            <h5 class="card-title">Lignes traitées</h5>
                            <p class="card-text" id="kpiRows">-</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Graphiques -->
            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <div class="chart-wrapper"><canvas id="durationChart"></canvas></div>
                </div>
                <div class="col-md-6">
                    <div class="chart-wrapper"><canvas id="top5Chart"></canvas></div>
                </div>
                <div class="col-md-6">
                    <div class="chart-wrapper"><canvas id="successFailureChart"></canvas></div>
                </div>
                <div class="col-md-6">
                    <div class="chart-wrapper"><canvas id="volumeChart"></canvas></div>
                </div>
            </div>

            <!-- Tableau et pagination -->
            <div class="table-container">
                <h5>Détail des exécutions</h5>
                <div class="table-responsive">
                    <table class="table table-striped" id="executionsTable">
                        <thead>
                            <tr>
                                <th data-sort="jobName">Job</th>
                                <th data-sort="startTime">Début</th>
                                <th data-sort="durationMs">Durée (ms)</th>
                                <th data-sort="status">Statut</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
                <div class="pagination-container">
                    <button id="prevBtn" class="btn btn-outline-primary" disabled>Précédent</button>
                    <span id="pageInfo" class="text-muted">Page 1 / 1</span>
                    <button id="nextBtn" class="btn btn-outline-primary" disabled>Suivant</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal détails -->
<div class="modal fade" id="detailModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Détails de l'exécution</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <h6>Logs d'erreur</h6>
        <table class="table table-sm" id="errorTable">
          <thead><tr><th>Heure</th><th>Composant</th><th>Message</th></tr></thead>
          <tbody></tbody>
        </table>
        <h6>Flow Meters</h6>
        <table class="table table-sm" id="meterTable">
          <thead>
            <tr>
              <th>Meter</th>
              <th>Compteur</th>
              <th>Valeur</th>
              <th>Référence</th>
              <th>Pourcentage</th>
              <th>État</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/dashboard.js"></script>
</body>
</html>
