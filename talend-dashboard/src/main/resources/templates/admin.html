<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/header :: head}"></th:block>
</head>
<body>

<th:block th:replace="~{fragments/header :: navbar}"></th:block>

<div class="container-fluid main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Machines configurées</h1>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addMachineModal">
            <i class="bi bi-plus-circle"></i> Ajouter une machine
        </button>
    </div>

    <!-- Liste des machines -->
    <div class="row g-3">
        <div class="col-md-4" th:each="m : ${machines}">
            <div class="card machine-card">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start">
                        <h5 class="card-title" th:text="${m.name}"></h5>
                        <!-- Utilisation de isEmpty() en plus de null -->
                        <span th:if="${m.jdbcUrl == null or m.jdbcUrl.isEmpty()}" class="badge bg-secondary">Fichiers</span>
                        <span th:unless="${m.jdbcUrl == null or m.jdbcUrl.isEmpty()}" class="badge bg-info">Base de données</span>
                    </div>
                    <!-- Détails Fichiers -->
                    <div th:if="${m.jdbcUrl == null or m.jdbcUrl.isEmpty()}" class="mt-2">
                        <small class="text-muted">
                            <strong>Stats :</strong> <code th:text="${m.statsPath}"></code><br>
                            <strong>Logs :</strong> <code th:text="${m.logsPath}"></code><br>
                            <strong>Meters :</strong> <code th:text="${m.metersPath}"></code>
                        </small>
                    </div>
                    <!-- Détails Base de données -->
                    <div th:unless="${m.jdbcUrl == null or m.jdbcUrl.isEmpty()}" class="mt-2">
                        <small class="text-muted">
                            <strong>URL :</strong> <span th:text="${m.jdbcUrl}"></span><br>
                            <strong>Stats :</strong> <code th:text="${m.statsQuery}"></code><br>
                            <strong>Logs :</strong> <code th:text="${m.logsQuery}"></code><br>
                            <strong>Meters :</strong> <code th:text="${m.metersQuery}"></code>
                        </small>
                    </div>
                    <a th:href="@{/admin/machine/{id}/delete(id=${m.id})}" 
                       class="btn btn-outline-danger btn-sm mt-2"
                       onclick="return confirm('Supprimer cette machine et toutes ses données ?')">
                        <i class="bi bi-trash"></i> Supprimer
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal d'ajout -->
<div class="modal fade" id="addMachineModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Ajouter une machine</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form th:action="@{/admin/machine}" method="post" id="addMachineForm">
            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label class="form-label">Nom de la machine</label>
                    <input name="name" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Source des données</label>
                    <select id="sourceMode" class="form-select">
                        <option value="FILE">Fichiers</option>
                        <option value="DB">Base de données</option>
                    </select>
                </div>
            </div>

            <!-- Bloc Fichiers -->
            <div id="fileSection">
                <h6>Chemins des fichiers</h6>
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Stats</label>
                        <input name="statsPath" class="form-control" placeholder="C:/logs/stats.txt">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Logs</label>
                        <input name="logsPath" class="form-control" placeholder="C:/logs/logs.txt">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Meters</label>
                        <input name="metersPath" class="form-control" placeholder="C:/logs/meters.txt">
                    </div>
                </div>
            </div>

            <!-- Bloc Base de données -->
            <div id="dbSection" style="display:none;">
                <h6>Connexion JDBC</h6>
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">URL JDBC</label>
                        <input name="jdbcUrl" class="form-control" placeholder="jdbc:sqlite:...">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Driver</label>
                        <input name="jdbcDriver" class="form-control" placeholder="org.sqlite.JDBC">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Utilisateur</label>
                        <input name="jdbcUser" class="form-control">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Mot de passe</label>
                        <input type="password" name="jdbcPassword" class="form-control">
                    </div>
                </div>
                <h6 class="mt-3">Requêtes SQL</h6>
                <div class="mb-3">
                    <label class="form-label">Stats</label>
                    <textarea name="statsQuery" class="form-control" rows="2" placeholder="SELECT ... FROM statcatcher"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Logs</label>
                    <textarea name="logsQuery" class="form-control" rows="2" placeholder="SELECT ... FROM logcatcher"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Meters</label>
                    <textarea name="metersQuery" class="form-control" rows="2" placeholder="SELECT ... FROM flowmeter"></textarea>
                </div>
            </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
        <button type="submit" form="addMachineForm" class="btn btn-primary">Enregistrer</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const sourceMode = document.getElementById('sourceMode');
    const fileSection = document.getElementById('fileSection');
    const dbSection = document.getElementById('dbSection');

    function toggleSections() {
        if (sourceMode.value === 'FILE') {
            fileSection.style.display = 'block';
            dbSection.style.display = 'none';
            // Désactiver les champs DB pour qu'ils ne soient pas envoyés
            document.querySelectorAll('#dbSection input, #dbSection textarea').forEach(el => el.disabled = true);
            document.querySelectorAll('#fileSection input').forEach(el => el.disabled = false);
        } else {
            fileSection.style.display = 'none';
            dbSection.style.display = 'block';
            // Désactiver les champs fichiers
            document.querySelectorAll('#fileSection input').forEach(el => el.disabled = true);
            document.querySelectorAll('#dbSection input, #dbSection textarea').forEach(el => el.disabled = false);
        }
    }
    sourceMode.addEventListener('change', toggleSections);
    // Initialisation au chargement (et après ouverture de la modale)
    window.addEventListener('load', toggleSections);
    // Pour s'assurer que la modale réinitialise bien l'état si on l'ouvre plusieurs fois
    document.getElementById('addMachineModal').addEventListener('shown.bs.modal', toggleSections);
</script>
</body>
</html>
