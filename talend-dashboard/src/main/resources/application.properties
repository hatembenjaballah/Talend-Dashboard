# Application
spring.application.name=talend-dashboard
server.port=8080

# SQLite
spring.datasource.url=jdbc:sqlite:talend-dashboard.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Thymeleaf
spring.thymeleaf.cache=false

# Machines configurables 
#machines[0].name=FTGTM1
#machines[0].stats.path=C:/Talend/Workspace Log/stats_file.txt
#machines[0].logs.path=C:/Talend/Workspace Log/logs_file.txt
#machines[0].meters.path=C:/Talend/Workspace Log/meter_file.txt

#machines[1].name=WDIB5n
#machines[1].stats.path=/data/stats_wdib5n.txt
#machines[1].logs.path=/data/logs_wdib5n.txt
#machines[1].meters.path=/data/meters_wdib5n.txt

# Import automatique toutes les heures
app.import.cron=0 0 * * * *
